# fly.toml app configuration file generated for transportation-system on 2025-09-13T13:30:00+00:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "transportation-system"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DEBUG = "False"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024