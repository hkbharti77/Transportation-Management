services:
  - type: web
    name: transportation-management
    env: python
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "source venv/bin/activate && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"


    
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.9
      - key: PIP_NO_CACHE_DIR
        value: "1"
      - key: PIP_DISABLE_PIP_VERSION_CHECK
        value: "1"
      - key: PYTHONPATH
        value: "."

databases:
  - name: transportation-db
    databaseName: transportation_db